name: Update profile assets

# Genera y publica TODOS los assets dinámicos del perfil (snake + gráfico de
# actividad animado + tarjetas de stats) en la rama `output`, en un único paso
# de publicación. Un solo publicador evita que dos workflows se pisen los
# ficheros entre sí en la misma rama (keep_files no es fiable para coexistir).

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/activity-graph.yml'
      - 'scripts/inject-activity-animation.py'

concurrency:
  group: profile-assets
  cancel-in-progress: false

jobs:
  update:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3
        with:
          github_user_name: diegoalegil
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#7aa2f7&color_dots=#1a1b27,#3d59a1,#7aa2f7,#bb9af7,#f7768e

      - name: Build activity graph + stats cards
        run: |
          mkdir -p dist
          # Gráfico de actividad animado (post-procesado con el script propio).
          curl -sL --fail --max-time 30 \
            "https://github-readme-activity-graph.vercel.app/graph?username=diegoalegil&theme=tokyo-night&hide_border=true&area=true&bg_color=1a1b27&color=7AA2F7&line=BB9AF7&point=F7768E" \
            -o /tmp/raw.svg
          test -s /tmp/raw.svg
          python3 scripts/inject-activity-animation.py /tmp/raw.svg dist/activity.svg
          # Tarjetas de stats: snapshot diario para no depender del servicio en cada visita
          # (si el proveedor cae, el perfil sigue mostrando la última copia buena).
          curl -sL --fail --max-time 30 \
            "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=diegoalegil&theme=tokyonight" \
            -o dist/stats.svg
          curl -sL --fail --max-time 30 \
            "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=diegoalegil&theme=tokyonight" \
            -o dist/repos-per-language.svg
          curl -sL --fail --max-time 30 \
            "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=diegoalegil&theme=tokyonight" \
            -o dist/profile-details.svg
          curl -sL --fail --max-time 30 \
            "https://streak-stats.demolab.com?user=diegoalegil&theme=tokyonight&hide_border=true&locale=es&card_width=400" \
            -o dist/streak.svg
          for f in dist/activity.svg dist/stats.svg dist/repos-per-language.svg dist/profile-details.svg dist/streak.svg; do
            test -s "$f" || { echo "Asset vacío o ausente: $f"; exit 1; }
          done

      - name: Publish all assets to output branch
        uses: crazy-max/ghaction-github-pages@c0d7ff0487ee0415efb7f32dab10ea880330b1dd # v3.1.0
        with:
          target_branch: output
          build_dir: dist   # dist contiene snake + activity + tarjetas: se publican juntos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
